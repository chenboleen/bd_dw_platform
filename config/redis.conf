# Redis 配置文件
# 数据仓库元数据管理系统

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 最大内存限制（256MB）
maxmemory 256mb

# 内存淘汰策略：LRU 算法淘汰最近最少使用的键
maxmemory-policy allkeys-lru

# 持久化配置（AOF）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB 快照配置
save 900 1
save 300 10
save 60 10000

# 日志级别
loglevel notice

# 慢查询日志（超过 10ms 记录）
slowlog-log-slower-than 10000
slowlog-max-len 128

# 连接超时（0 表示不超时）
timeout 0

# TCP keepalive
tcp-keepalive 300

# 数据库数量
databases 16
