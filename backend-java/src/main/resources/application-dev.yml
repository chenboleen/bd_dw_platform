# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/metadata_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      password:

# Elasticsearch 配置
elasticsearch:
  uris: http://localhost:9200

# 日志级别
logging:
  level:
    root: INFO
    com.kiro.metadata: DEBUG
    org.springframework.security: DEBUG

# 开发环境允许跨域
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
